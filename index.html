  <meta property="og:description" content="Smart Switch부터 유심 전환, 금융앱 검증까지 한 번에 끝내는 실전 체크리스트" />
  <meta property="og:url" content="https://notoow.github.io/samsung-smart-switch/" />

  <meta name="twitter:description" content="자급제 갤럭시 S26 셀프 이전을 위한 단계형 체크리스트" />

  <title>Galaxy S26 셀프 이전 체크메이트</title>
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png" />
  <link rel="icon" href="./assets/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png" />
  <link rel="manifest" href="./site.webmanifest" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Urbanist:wght@600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./styles.css" />

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Galaxy S26 셀프 이전 체크메이트",
      "description": "갤럭시 S26 자급제 사용자를 위한 셀프 이전 가이드 웹 앱",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Android",
      "inLanguage": "ko-KR",
      "isAccessibleForFree": true,
      "url": "https://notoow.github.io/samsung-smart-switch/",
      "image": "https://notoow.github.io/samsung-smart-switch/assets/og-image.png"
    }
  </script>
</head>
<body>
  <div class="ambient ambient-left" aria-hidden="true"></div>
  <div class="ambient ambient-right" aria-hidden="true"></div>

  <main class="layout">
    <header class="hero card">
      <p class="eyebrow">Galaxy Device Setup Assistant</p>
      <div class="hero-topline">
        <span class="badge">비공식 가이드</span>
        <span class="badge soft">Smart Switch 기반</span>
      </div>
      <h1>갤럭시 S26 셀프 이전 체크메이트</h1>
      <p class="subtitle">
        매장 도움 없이도, 데이터 이동부터 유심·금융앱 점검까지 단계별로 차근히 진행할 수 있습니다.
      </p>
      <p class="subtitle compact">
        사용자 제공 영상 내용을 바탕으로 실수 방지 순서만 간결하게 정리했습니다.
      </p>
      <div class="hero-meta">
        <div class="progress-wrap" aria-label="전체 진행률">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <p id="progressText" class="progress-text">0 / 0 완료 (0%)</p>
      </div>
    </header>

    <section class="summary card">
      <h2>지금 해야 할 일</h2>
      <p id="nextTask" class="next-task">아직 시작 전입니다.</p>
      <p id="riskAlert" class="risk-alert" hidden></p>
      <div class="actions">
        <button id="resetBtn" type="button" class="ghost">전체 초기화</button>
        <button id="exportBtn" type="button" class="ghost">상태 내보내기</button>
        <button id="importBtn" type="button" class="ghost">상태 불러오기</button>
        <input id="importInput" type="file" accept="application/json" hidden />
      </div>
    </section>

    <section class="coach card">
      <h2>도움 힌트</h2>
      <p id="coachLine" class="coach-line">
        막히는 구간만 조용히 안내합니다. 지금 단계와 가장 가까운 팁이 표시됩니다.
      </p>
    </section>

    <section id="checklistRoot" class="checklist-grid" aria-label="폰 변경 체크리스트"></section>

    <section class="memo card">
      <div class="memo-head">
        <h2>개인 메모</h2>
        <button id="clearMemoBtn" type="button" class="ghost small">메모 지우기</button>
      </div>
      <textarea
        id="memoInput"
        rows="6"
        placeholder="예: 카카오 계정 비밀번호, 금융앱 재인증 순서, eSIM 변경 완료 시간"
      ></textarea>
    </section>
  </main>

  <template id="stageTemplate">
    <article class="stage card">
      <header class="stage-header">
        <p class="stage-kicker"></p>
        <h3 class="stage-title"></h3>
        <p class="stage-desc"></p>
        <p class="stage-progress"></p>
      </header>
      <ul class="task-list"></ul>
    </article>
  </template>

  <template id="taskTemplate">
    <li class="task-item">
      <label>
        <input class="task-checkbox" type="checkbox" />
        <span class="task-content">
          <span class="task-title"></span>
          <span class="task-note"></span>
        </span>
      </label>
    </li>
  </template>

  <script src="./app.js"></script>
</body>
</html>
